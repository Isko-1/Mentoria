    * {

    body {

      color: #1a1a1a;
      font-family: 'Segoe UI', -apple-system, system-ui, 'Helvetica Neue', sans-serif;
    }

    /* Спиннер загрузки */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .animate-spin-fast {
      animation: spin 0.8s linear infinite;
    }

    /* Анимация появления */
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-in {
      animation: slideInUp 0.3s ease-out;
    }

    /* Плавное исчезновение тоаста */
    @keyframes slideOutDown {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .animate-slide-out {
      animation: slideOutDown 0.3s ease-in forwards;
    }

    /* Красивый скролл для каталога */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(79, 70, 229, 0.3);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(79, 70, 229, 0.5);
    }

    /* Gradient текст */
    .gradient-text {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Карточка с эффектом при наведении */
    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.1);
    }

    /* Модальное окно анимация */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-enter {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

    const DELAY = 400; // Задержка для имитации реального запроса

    const mockAPI = {
      // Получить профиль пользователя
      getProfile: async () => {
        await new Promise(r => setTimeout(r, DELAY));
        const stored = localStorage.getItem('userProfile');
        return stored ? JSON.parse(stored) : null;
      },

      // Сохранить профиль
      saveProfile: async (profile) => {
        await new Promise(r => setTimeout(r, DELAY));
        localStorage.setItem('userProfile', JSON.stringify(profile));
        return profile;
      },

      // Получить все возможности
      getOpportunities: async () => {
        await new Promise(r => setTimeout(r, DELAY));
        const stored = localStorage.getItem('opportunities');
        return stored ? JSON.parse(stored) : getMockOpportunities();
      },

        await new Promise(r => setTimeout(r, DELAY));
        const current = JSON.parse(localStorage.getItem('opportunities') || JSON.stringify(getMockOpportunities()));

        current.push(newOpp);
        localStorage.setItem('opportunities', JSON.stringify(current));
        return newOpp;

        const newCourse = { ...course, id: Date.now() };
        current.push(newCourse);
        localStorage.setItem('courses', JSON.stringify(current));
        return newCourse;
      },

      // Обновить прогресс
      updateProgress: async (courseId, lessonId) => {
        await new Promise(r => setTimeout(r, DELAY));
        const progress = JSON.parse(localStorage.getItem('progress') || '{}');
        if (!progress[courseId]) progress[courseId] = [];
        if (!progress[courseId].includes(lessonId)) {
          progress[courseId].push(lessonId);
        }
        localStorage.setItem('progress', JSON.stringify(progress));
        return progress;
      },

      // Получить прогресс
      getProgress: async () => {
        await new Promise(r => setTimeout(r, DELAY));
        return JSON.parse(localStorage.getItem('progress') || '{}');
      },

        await new Promise(r => setTimeout(r, DELAY));
        return JSON.parse(localStorage.getItem('favorites') || '[]');
      },

        await new Promise(r => setTimeout(r, DELAY));
        localStorage.setItem('favorites', JSON.stringify(favorites));
        return favorites;

    function CatalogPage({ opportunities, favorites, toggleFavorite, onApply, loading }) {

      const [selectedGrade, setSelectedGrade] = useState('Все');

        const matchesSearch = o.title.toLowerCase().includes(search.toLowerCase()) ||
                              o.description.toLowerCase().includes(search.toLowerCase());
        const matchesCategory = selectedCategory === 'Все' || o.category === selectedCategory;
        const matchesGrade = selectedGrade === 'Все' || o.grades.includes(parseInt(selectedGrade));
        return matchesSearch && matchesCategory && matchesGrade;
      });

      return (
        <div className="min-h-screen bg-white">
          <div className="max-w-7xl mx-auto px-4 py-12">
            {/* Заголовок */}

            {/* Поиск и фильтры */}

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {/* Поиск */}

                  <label className="block text-sm font-semibold text-gray-700 mb-2">Поиск</label>
                  <div className="relative">
                    <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" />
                    <input
                      type="text"
                      placeholder="Поиск по названию или описанию..."
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                      className="w-full pl-10 pr-4 py-2.5 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500 text-gray-900"
                    />
                  </div>
                </div>

                {/* Категория */}
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">Категория</label>
                  <select
                    value={selectedCategory}
                    onChange={(e) => setSelectedCategory(e.target.value)}
                    className="w-full px-4 py-2.5 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500 text-gray-900"
                  >
                    {categories.map(c => (
                      <option key={c} value={c}>{c}</option>

              <div className="mt-4">
                <label className="block text-sm font-semibold text-gray-700 mb-2">Класс</label>
                <div className="flex flex-wrap gap-2">
                  {grades.map(g => (
                    <button
                      key={g}
                      onClick={() => setSelectedGrade(g === 'Все' ? 'Все' : g.toString())}
                      className={`
                        px-4 py-1.5 rounded-lg font-medium transition-all
                        ${selectedGrade === (g === 'Все' ? 'Все' : g.toString())
                          ? 'bg-indigo-600 text-white'
                          : 'bg-white border-2 border-gray-300 text-gray-700 hover:border-indigo-400'
                        }
                      `}
                    >
                      {g === 'Все' ? 'Все' : `${g} класс`}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Результаты */}
            {loading ? (
              <Spinner />
            ) : (
              <div>
                <p className="text-sm text-gray-600 mb-6">Найдено: <span className="font-bold text-gray-900">{filtered.length}</span> возможностей</p>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {filtered.map(opp => {
                    const isFavorite = favorites.includes(opp.id);
                    return (
                      <div key={opp.id} className="bg-white border-2 border-gray-200 rounded-xl overflow-hidden card-hover">
                        {/* Шапка карточки */}

                            <span className="inline-block px-3 py-1 rounded-full bg-white/20 text-white text-xs font-bold">
                              {opp.category}
                            </span>
                            <button
                              onClick={() => toggleFavorite(opp.id)}
                              className={`p-1.5 rounded-lg transition-all ${
                                isFavorite
                                  ? 'bg-rose-500/20 text-rose-100'
                                  : 'hover:bg-white/10 text-white/70'
                              }`}
                            >
                              <Heart className={`w-5 h-5 ${isFavorite ? 'fill-current' : ''}`} />
                            </button>

                {filtered.length === 0 && (
                  <div className="text-center py-12">
                    <AlertCircle className="w-12 h-12 text-gray-400 mx-auto mb-4" />
                    <p className="text-gray-600">Нет результатов по вашему запросу</p>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // КОМПОНЕНТ КУРСОВ
    // ═══════════════════════════════════════════════════════════════════

    function CoursesPage({ courses, progress, onProgressUpdate, loading, addToast }) {
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [selectedLessonId, setSelectedLessonId] = useState(null);
      const [quizAnswers, setQuizAnswers] = useState({});

      const selectedCourse = courses.find(c => c.id === selectedCourseId) || courses[0];
      const selectedLesson = selectedCourse?.lessons?.find(l => l.id === selectedLessonId) || selectedCourse?.lessons?.[0];
      const courseProgress = progress[selectedCourse?.id] || [];
      const completionPercent = selectedCourse ? Math.round((courseProgress.length / selectedCourse.lessons.length) * 100) : 0;

      const handleLessonClick = (lesson) => {
        setSelectedLessonId(lesson.id);
        setQuizAnswers({});
      };

      const handleQuizAnswer = (questionIndex, answerIndex) => {
        setQuizAnswers(prev => ({
          ...prev,
          [questionIndex]: answerIndex
        }));
      };

      const handleSubmitQuiz = () => {
        const quiz = selectedLesson.quiz;
        const allCorrect = Object.keys(quiz.questions).every(idx => {
          const qIdx = parseInt(idx);
          return quizAnswers[qIdx] === quiz.questions[qIdx].correct;
        });

        if (allCorrect) {
          addToast('✨ Все ответы верны! Урок завершен', 'success');
          onProgressUpdate(selectedCourse.id, selectedLesson.id);
          setTimeout(() => {
            const nextLesson = selectedCourse.lessons.find(l => l.id !== selectedLesson.id && !courseProgress.includes(l.id));
            if (nextLesson) {
              setSelectedLessonId(nextLesson.id);
              setQuizAnswers({});
            }
          }, 500);
        } else {
          addToast('❌ Некоторые ответы неверны. Попробуйте ещё раз', 'error');
        }
      };

      return (
        <div className="min-h-screen bg-white">
          <div className="max-w-7xl mx-auto px-4 py-12">
            <h1 className="text-4xl font-bold text-gray-900 mb-8">Мои курсы</h1>

            {loading ? (
              <Spinner />
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                {/* Список курсов */}
                <div className="lg:col-span-1">
                  <div className="bg-gray-50 border-2 border-gray-200 rounded-xl p-4 space-y-2">
                    {courses.map(course => {
                      const courseProgress = progress[course.id] || [];
                      const percent = Math.round((courseProgress.length / course.lessons.length) * 100);
                      const isSelected = selectedCourseId === course.id;

                      return (
                        <button
                          key={course.id}
                          onClick={() => {
                            setSelectedCourseId(course.id);
                            setSelectedLessonId(course.lessons[0].id);
                            setQuizAnswers({});
                          }}
                          className={`
                            w-full text-left p-4 rounded-lg border-2 transition-all
                            ${isSelected
                              ? 'border-indigo-600 bg-indigo-50'
                              : 'border-gray-200 hover:border-gray-300'
                            }
                          `}
                        >
                          <div className="font-semibold text-gray-900 text-sm mb-2">{course.title}</div>
                          <div className="w-full bg-gray-300 rounded-full h-2">
                            <div
                              className="bg-indigo-600 h-2 rounded-full transition-all"
                              style={{ width: `${percent}%` }}
                            />
                          </div>
                          <div className="text-xs text-gray-600 mt-1">{percent}%</div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Основной контент */}
                <div className="lg:col-span-3 space-y-8">
                  {selectedCourse && (
                    <>
                      {/* Информация о курсе */}
                      <div className="bg-gradient-to-r from-indigo-600 to-violet-600 text-white rounded-xl p-8">
                        <h2 className="text-3xl font-bold mb-2">{selectedCourse.title}</h2>
                        <p className="text-indigo-100 mb-6">{selectedCourse.description}</p>
                        <div className="flex flex-wrap gap-4 text-sm">
                          <div>
                            <span className="opacity-80">Инструктор:</span> <span className="font-semibold">{selectedCourse.instructor}</span>
                          </div>
                          <div>
                            <span className="opacity-80">Продолжительность:</span> <span className="font-semibold">{selectedCourse.duration}</span>
                          </div>
                        </div>
                      </div>

                      {/* Прогресс курса */}
                      <div className="bg-gray-50 border-2 border-gray-200 rounded-xl p-6">
                        <div className="flex items-center justify-between mb-4">
                          <span className="text-lg font-bold text-gray-900">Прогресс курса</span>
                          <span className="text-2xl font-bold text-indigo-600">{completionPercent}%</span>
                        </div>
                        <div className="w-full bg-gray-300 rounded-full h-4">
                          <div
                            className="bg-gradient-to-r from-indigo-600 to-violet-600 h-4 rounded-full transition-all"
                            style={{ width: `${completionPercent}%` }}
                          />
                        </div>
                      </div>

                      {/* Уроки */}
                      <div className="bg-gray-50 border-2 border-gray-200 rounded-xl p-6 space-y-3">
                        <h3 className="text-lg font-bold text-gray-900 mb-4">Уроки</h3>
                        {selectedCourse.lessons.map((lesson, idx) => {
                          const isCompleted = courseProgress.includes(lesson.id);
                          const isSelected = selectedLessonId === lesson.id;

                          return (
                            <button
                              key={lesson.id}
                              onClick={() => handleLessonClick(lesson)}
                              className={`
                                w-full text-left p-4 rounded-lg border-2 transition-all
                                ${isSelected
                                  ? 'border-indigo-600 bg-indigo-50'
                                  : 'border-gray-200 hover:border-gray-300'
                                }
                              `}
                            >
                              <div className="flex items-start gap-3">
                                <div className={`
                                  w-6 h-6 rounded flex items-center justify-center flex-shrink-0 mt-1
                                  ${isCompleted
                                    ? 'bg-emerald-600'
                                    : 'bg-gray-300'
                                  }
                                `}>
                                  {isCompleted && <Check className="w-4 h-4 text-white" />}
                                </div>
                                <div className="flex-1">
                                  <div className="font-semibold text-gray-900">{lesson.title}</div>
                                  <div className="text-sm text-gray-600 mt-1 flex items-center gap-2">
                                    {lesson.type === 'quiz' && '📝'}
                                    {lesson.type === 'video' && '▶️'}
                                    {lesson.type === 'article' && '📄'}
                                    <span>{lesson.duration}</span>
                                  </div>
                                </div>
                              </div>
                            </button>
                          );
                        })}
                      </div>

                      {/* Содержимое урока */}
                      {selectedLesson && (
                        <div className="bg-white border-2 border-gray-200 rounded-xl p-8">
                          <h3 className="text-2xl font-bold text-gray-900 mb-4">{selectedLesson.title}</h3>

                          {selectedLesson.type === 'video' && (
                            <div className="mb-6">
                              <div className="bg-gray-200 rounded-lg aspect-video flex items-center justify-center mb-4">
                                <div className="text-center">
                                  <Play className="w-16 h-16 text-gray-400 mx-auto mb-2" />
                                  <p className="text-gray-600">Видеоплеер</p>
                                  <p className="text-sm text-gray-500 mt-2">{selectedLesson.duration}</p>
                                </div>
                              </div>
                            </div>
                          )}

                          {selectedLesson.type !== 'quiz' && (
                            <div className="prose prose-sm max-w-none mb-6">
                              <p className="text-gray-700 leading-relaxed">{selectedLesson.content}</p>
                            </div>
                          )}

                          {selectedLesson.type === 'quiz' && selectedLesson.quiz && (
                            <div className="space-y-6">
                              {selectedLesson.quiz.questions.map((q, qIdx) => (
                                <div key={qIdx} className="bg-gray-50 border-2 border-gray-200 p-6 rounded-lg">
                                  <p className="font-semibold text-gray-900 mb-4">{qIdx + 1}. {q.question}</p>
                                  <div className="space-y-2">
                                    {q.options.map((option, oIdx) => (
                                      <label key={oIdx} className="flex items-center gap-3 p-3 border-2 border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 transition-all">
                                        <input
                                          type="radio"
                                          name={`question-${qIdx}`}
                                          checked={quizAnswers[qIdx] === oIdx}
                                          onChange={() => handleQuizAnswer(qIdx, oIdx)}
                                          className="w-4 h-4 accent-indigo-600"
                                        />
                                        <span className="text-gray-900">{option}</span>
                                      </label>
                                    ))}
                                  </div>
                                  {quizAnswers[qIdx] !== undefined && (
                                    <div className={`
                                      mt-4 p-3 rounded-lg
                                      ${quizAnswers[qIdx] === q.correct
                                        ? 'bg-emerald-50 border-2 border-emerald-300 text-emerald-800'
                                        : 'bg-rose-50 border-2 border-rose-300 text-rose-800'
                                      }
                                    `}>
                                      <p className="text-sm font-semibold mb-1">
                                        {quizAnswers[qIdx] === q.correct ? '✓ Верно!' : '✗ Неверно'}
                                      </p>
                                      <p className="text-sm">{q.explanation}</p>
                                    </div>
                                  )}
                                </div>
                              ))}

                              <button
                                onClick={handleSubmitQuiz}
                                disabled={Object.keys(quizAnswers).length !== selectedLesson.quiz.questions.length}
                                className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white font-semibold rounded-lg transition-all"
                              >
                                Проверить ответы
                              </button>
                            </div>
                          )}

                          {selectedLesson.type !== 'quiz' && !courseProgress.includes(selectedLesson.id) && (
                            <button
                              onClick={() => {
                                onProgressUpdate(selectedCourse.id, selectedLesson.id);
                                addToast('✨ Урок отмечен как завершенный!', 'success');
                              }}
                              className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-all"
                            >
                              Отметить как завершённый
                            </button>
                          )}

                          {courseProgress.includes(selectedLesson.id) && (
                            <div className="p-4 bg-emerald-50 border-2 border-emerald-300 rounded-lg flex items-center gap-2">
                              <Check className="w-5 h-5 text-emerald-600" />
                              <span className="text-emerald-700 font-semibold">Вы завершили этот урок</span>
                            </div>
                          )}
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function AdminPanel({ onClose, opportunities, setOpportunities, courses, setCourses, addToast }) {

      const [showPasswordError, setShowPasswordError] = useState(false);

        e.preventDefault();

          setIsAuthenticated(true);
          setShowPasswordError(false);
          addToast('🔐 Добро пожаловать в админ-панель!', 'success');
        } else {
          setShowPasswordError(true);
          addToast('❌ Неверный пароль', 'error');

            format: 'Онлайн',

            requirements: 'Ученики 8–11 класса',
            tags: [newOppCategory],
            grades: [8, 9, 10, 11],
            city: 'Online'
          };
          setOpportunities([...opportunities, newOpp]);
          setNewOppName('');
          setNewOppCategory('Олимпиада');
          setNewOppDeadline('');
          addToast('✅ Возможность добавлена!', 'success');
        }
      };

      if (!isAuthenticated) {
        return (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md animate-slide-in">
              <div className="bg-gradient-to-r from-indigo-600 to-violet-600 text-white px-6 py-4 flex items-center justify-between">
                <h2 className="text-xl font-bold flex items-center gap-2">
                  <Lock className="w-5 h-5" />
                  Вход в админ-панель
                </h2>
                <button onClick={onClose} className="p-1 hover:bg-white/20 rounded-lg">
                  <X className="w-5 h-5" />

                  <label className="block text-sm font-semibold text-gray-700 mb-2">Пароль администратора</label>
                  <input
                    type="password"
                    value={adminPassword}
                    onChange={(e) => {
                      setAdminPassword(e.target.value);
                      setShowPasswordError(false);
                    }}
                    placeholder="Введите пароль..."
                    className={`
                      w-full px-4 py-2.5 border-2 rounded-lg focus:outline-none
                      ${showPasswordError ? 'border-red-500 bg-red-50' : 'border-gray-300 focus:border-indigo-500'}
                    `}
                  />
                  {showPasswordError && (
                    <p className="text-sm text-red-600 mt-2">⚠️ Неверный пароль</p>
                  )}
                </div>

                <button
                  type="submit"
                  className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-all"
                >
                  Войти
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 bg-black/50 z-50 overflow-y-auto">
          <div className="min-h-screen p-4 flex items-center justify-center">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl animate-slide-in">
              {/* Заголовок */}
              <div className="bg-gradient-to-r from-indigo-600 to-violet-600 text-white px-6 py-4 flex items-center justify-between">
                <h2 className="text-2xl font-bold flex items-center gap-2">
                  <Zap className="w-6 h-6" />
                  Админ-панель
                </h2>
                <button onClick={onClose} className="p-1 hover:bg-white/20 rounded-lg">
                  <X className="w-5 h-5" />

              </div>

              {/* Содержимое */}
              <div className="p-6 space-y-8">

                  <h3 className="text-lg font-bold text-gray-900 mb-4">📊 Статистика</h3>

                      <div className="text-2xl font-bold text-blue-600">{opportunities.length}</div>

                    <div className="bg-green-50 border-2 border-green-200 rounded-lg p-4 text-center">

                    <div className="bg-purple-50 border-2 border-purple-200 rounded-lg p-4 text-center">

                    <input
                      type="text"
                      placeholder="Название возможности..."

            </div>

        </div>
      );

    // ═══════════════════════════════════════════════════════════════════
    // ГЛАВНЫЙ КОМПОНЕНТ ПРИЛОЖЕНИЯ
    // ═══════════════════════════════════════════════════════════════════

    function MentoriaApp() {
      const [currentTab, setCurrentTab] = useState('home');
      const [profile, setProfile] = useState(null);
      const [opportunities, setOpportunities] = useState([]);
      const [courses, setCourses] = useState([]);
      const [progress, setProgress] = useState({});
      const [favorites, setFavorites] = useState([]);
      const [leaderboard, setLeaderboard] = useState(getMockLeaderboard());
      const [toasts, setToasts] = useState([]);
      const [showAdmin, setShowAdmin] = useState(false);
      const [loading, setLoading] = useState(true);

      // Инициализация при загрузке
      useEffect(() => {
        const init = async () => {
          setLoading(true);
          try {
            // Получить профиль
            let userProfile = await mockAPI.getProfile();
            if (!userProfile) {
              userProfile = {
                name: "Нурлан Сериков",
                grade: 10,
                school: "НИШ ФМН, г. Алматы",
                interests: ["Программирование", "STEM"],
                avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80"
              };
              await mockAPI.saveProfile(userProfile);
            }
            setProfile(userProfile);

            // Получить возможности
            const opps = await mockAPI.getOpportunities();
            setOpportunities(opps);

            // Получить курсы
            const crses = await mockAPI.getCourses();
            setCourses(crses);

            // Получить прогресс
            const prog = await mockAPI.getProgress();
            setProgress(prog);

            // Получить избранные
            const favs = await mockAPI.getFavorites();
            setFavorites(favs);
          } catch (error) {
            console.error('Ошибка инициализации:', error);
          } finally {
            setLoading(false);
          }
        };

        init();
      }, []);

      // Функция добавления тоаста
      const addToast = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 4000);
      }, []);

      // Обновить прогресс
      const handleProgressUpdate = useCallback(async (courseId, lessonId) => {
        const newProgress = await mockAPI.updateProgress(courseId, lessonId);
        setProgress(newProgress);

        // Обновить рейтинг
        setLeaderboard(prev => {
          const updated = prev.map(user => {
            if (user.name === "Вы") {
              return { ...user, points: user.points + 50 };
            }
            return user;
          });
          return updated.sort((a, b) => b.points - a.points);
        });
      }, []);

      // Переключить избранное
      const handleToggleFavorite = useCallback(async (id) => {
        let newFavorites;
        if (favorites.includes(id)) {
          newFavorites = favorites.filter(f => f !== id);
        } else {
          newFavorites = [...favorites, id];
        }
        await mockAPI.updateFavorites(newFavorites);
        setFavorites(newFavorites);
        addToast(newFavorites.includes(id) ? '❤️ Добавлено в избранное' : '💔 Удалено из избранного');
      }, [favorites, addToast]);

      // Подать заявку
      const handleApplyOpportunity = useCallback((opp) => {
        addToast('📄 Заявка успешно отправлена! Организаторы свяжутся с вами.', 'success');
      }, [addToast]);

      // Выход
      const handleLogout = useCallback(() => {
        setProfile(null);
        setCurrentTab('home');
        addToast('👋 Вы вышли из аккаунта', 'info');
      }, [addToast]);

      return (
        <div className="min-h-screen bg-white">
          {/* Шапка */}
          <Header
            currentTab={currentTab}
            setTab={setCurrentTab}
            profile={profile}
            onLogout={handleLogout}
            onAdminClick={() => setShowAdmin(true)}
          />

          {/* Основной контент */}
          <main>
            {currentTab === 'home' && (
              <HomePage
                setTab={setCurrentTab}
                profile={profile}
                leaderboard={leaderboard}
                coursesCount={courses.length}
              />
            )}

            {currentTab === 'catalog' && (
              <CatalogPage
                opportunities={opportunities}
                favorites={favorites}
                toggleFavorite={handleToggleFavorite}
                onApply={handleApplyOpportunity}
                loading={loading}
              />
            )}

            {currentTab === 'courses' && (
              <CoursesPage
                courses={courses}
                progress={progress}
                onProgressUpdate={handleProgressUpdate}
                loading={loading}
                addToast={addToast}
              />
            )}

            {currentTab === 'rating' && (
              <RatingPage leaderboard={leaderboard} />
            )}

            {currentTab === 'cabinet' && profile && (
              <CabinetPage
                profile={profile}
                courses={courses}
                progress={progress}
                opportunities={opportunities}
                favorites={favorites}
                onCourseSelect={(courseId) => setCurrentTab('courses')}
                onLogout={handleLogout}
              />
            )}

            {currentTab === 'cabinet' && !profile && (
              <div className="min-h-screen flex items-center justify-center">
                <div className="text-center">
                  <Lock className="w-16 h-16 text-gray-400 mx-auto mb-4" />
                  <h2 className="text-2xl font-bold text-gray-900 mb-2">Требуется вход</h2>
                  <p className="text-gray-600">Войдите в аккаунт для доступа к личному кабинету</p>
                </div>
              </div>
            )}
          </main>

          {/* Админ-панель */}
          {showAdmin && (
            <AdminPanel
              onClose={() => setShowAdmin(false)}
              opportunities={opportunities}
              setOpportunities={setOpportunities}
              courses={courses}
              setCourses={setCourses}
              addToast={addToast}
            />
          )}

          {/* Тоасты */}
          <Toast toasts={toasts} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
